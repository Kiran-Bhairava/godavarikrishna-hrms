# alembic.ini
# Place this file at the project ROOT (same level as backend/ and frontend/).
#
# Project layout:
#   attendance/
#   |-- alembic.ini          <- this file
#   |-- .env
#   |-- backend/
#   |   |-- main.py
#   |   |-- models.py
#   |   |-- schemas.py
#   |   +-- migrations/
#   |       |-- env.py
#   |       |-- script.py.mako
#   |       +-- versions/
#   +-- frontend/
#
# Run all alembic commands from the project root:
#   alembic upgrade head
#   alembic revision --autogenerate -m "add column x"
#   alembic downgrade -1
[alembic]
script_location = migrations

# DATABASE_URL is injected in env.py from the environment.
# You can hard-code here for local dev only (never commit credentials):
# sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/attendance_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S