<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GodavariKrishna · Staff Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #1e5ed8;
        --primary-dark: #1447b5;
        --bg: #f5f5f5;
        --surface: #ffffff;
        --border: #e0e0e0;
        --text: #000;
        --text-secondary: #666;
        --text-muted: #999;
        --success: #10b981;
        --success-light: #ecfdf5;
        --danger: #ef4444;
        --warning: #f59e0b;
        --info-bg: #f0f9ff;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.12);
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* ── HEADER ── */
      .header {
        background: var(--surface);
        padding: 16px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: var(--shadow);
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .header-icon {
        width: 32px;
        height: 32px;
        background: var(--primary);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 14px;
      }

      .header-title {
        font-weight: 700;
        font-size: 14px;
        color: var(--text);
      }

      .header-subtitle {
        font-weight: 500;
        font-size: 11px;
        color: var(--text-muted);
      }

      .header-right {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .header-btn {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        transition: all 0.2s;
      }

      .header-btn:hover {
        background: var(--info-bg);
        border-color: var(--primary);
        color: var(--primary);
      }

      .header-btn svg {
        width: 16px;
        height: 16px;
      }

      /* ── CONTAINER ── */
      .container {
        max-width: 420px;
        margin: 0 auto;
        padding: 16px;
        padding-bottom: 80px;
      }

      /* ── CARD ── */
      .card {
        background: var(--surface);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
      }

      .card-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .card-label svg {
        width: 14px;
        height: 14px;
      }

      /* ── INFO CARDS ── */
      .info-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 16px;
      }

      .info-card {
        background: var(--info-bg);
        border: 1px solid #bfdbfe;
        border-radius: 10px;
        padding: 12px;
        text-align: center;
      }

      .info-card-icon {
        font-size: 20px;
        margin-bottom: 6px;
      }

      .info-card-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .info-card-value {
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
      }

      /* ── CLOCK CARD ── */
      .clock-card {
        background: linear-gradient(135deg, #f0f9ff 0%, #f3e8ff 100%);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        margin-bottom: 16px;
        border: 1px solid #bfdbfe;
      }

      .clock-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .clock-display {
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 4px;
        margin-bottom: 12px;
      }

      .clock-time {
        font-size: 48px;
        font-weight: 800;
        color: var(--primary);
        font-family: "Courier New", monospace;
        letter-spacing: -1px;
      }

      .clock-period {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-secondary);
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: var(--success-light);
        border: 1px solid rgba(16, 185, 129, 0.2);
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        color: var(--success);
      }

      .status-badge.outside {
        background: #fee2e2;
        border-color: rgba(239, 68, 68, 0.2);
        color: var(--danger);
      }

      .status-badge.pending {
        background: #f3f4f6;
        border-color: var(--border);
        color: var(--text-secondary);
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        display: inline-block;
      }

      /* ── ACTION BUTTONS ── */
      .action-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 16px;
      }

      .action-btn {
        padding: 14px 12px;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .action-btn svg {
        width: 16px;
        height: 16px;
      }

      .punch-in {
        background: var(--primary);
        color: white;
        box-shadow: 0 4px 12px rgba(30, 94, 216, 0.3);
      }

      .punch-in:hover:not(:disabled) {
        background: var(--primary-dark);
        box-shadow: 0 6px 16px rgba(30, 94, 216, 0.4);
        transform: translateY(-2px);
      }

      .punch-out {
        background: var(--surface);
        color: var(--text-secondary);
        border: 2px solid var(--border);
      }

      .punch-out:hover:not(:disabled) {
        border-color: var(--text-secondary);
        background: #fafafa;
      }

      .action-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* ── RECENT ACTIVITY ── */
      .activity-section {
        margin-bottom: 16px;
      }

      .activity-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding: 0 0 8px 0;
        border-bottom: 1px solid var(--border);
      }

      .activity-title {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--text-muted);
        letter-spacing: 0.5px;
      }

      .activity-link {
        font-size: 11px;
        color: var(--primary);
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
      }

      .activity-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid #f0f0f0;
      }

      .activity-item:last-child {
        border-bottom: none;
      }

      .activity-icon {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--success-light);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--success);
        flex-shrink: 0;
        font-weight: 700;
      }

      .activity-content {
        flex: 1;
        min-width: 0;
      }

      .activity-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 2px;
      }

      .activity-time {
        font-size: 11px;
        color: var(--text-muted);
      }

      /* ── MAP CARD ── */
      .map-card {
        margin-bottom: 16px;
      }

      .map-container {
        height: 240px;
        border-radius: 10px;
        overflow: hidden;
        background: linear-gradient(135deg, #f0f9ff 0%, #f3e8ff 100%);
        position: relative;
        border: 1px solid #bfdbfe;
        margin-bottom: 8px;
      }

      .map-placeholder {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--primary);
      }

      .map-placeholder svg {
        width: 40px;
        height: 40px;
      }

      .map-placeholder span {
        font-size: 12px;
        font-weight: 600;
        color: var(--primary);
      }

      #leafletMap {
        height: 100%;
        width: 100%;
      }

      .map-footer {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        padding: 0 4px;
      }

      /* ── LOCATION DETAILS ── */
      .location-details {
        background: var(--info-bg);
        border: 1px solid #bfdbfe;
        border-radius: 10px;
        padding: 12px;
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.5;
      }

      /* ── MODAL ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        align-items: flex-end;
        justify-content: center;
        z-index: 500;
      }

      .modal-overlay.open {
        display: flex;
      }

      .modal-sheet {
        background: var(--surface);
        border-radius: 20px 20px 0 0;
        width: 100%;
        max-width: 100%;
        padding: 0;
        animation: slideUp 0.3s ease;
        box-shadow: var(--shadow-lg);
      }

      @keyframes slideUp {
        from {
          transform: translateY(100%);
        }
        to {
          transform: translateY(0);
        }
      }

      .modal-handle {
        width: 40px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin: 12px auto 0;
      }

      .modal-header {
        padding: 14px 20px 12px;
        border-bottom: 1px solid var(--border);
        text-align: center;
      }

      .modal-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
      }

      .modal-map {
        height: 200px;
        background: linear-gradient(135deg, #f0f9ff 0%, #f3e8ff 100%);
        position: relative;
      }

      #confirmMap {
        height: 100%;
        width: 100%;
      }

      .modal-body {
        padding: 16px 20px;
      }

      .modal-info {
        margin-bottom: 16px;
      }

      .modal-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .modal-address {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 12px;
        line-height: 1.4;
      }

      .modal-time-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 16px;
      }

      .modal-time {
        font-size: 28px;
        font-weight: 800;
        color: var(--primary);
        font-family: "Courier New", monospace;
      }

      .modal-date {
        font-size: 11px;
        color: var(--text-secondary);
        margin-top: 2px;
      }

      .modal-meta {
        text-align: right;
        font-size: 11px;
        color: var(--text-secondary);
      }

      .modal-confirm-btn {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        margin-bottom: 8px;
        transition: all 0.2s;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .modal-confirm-btn:hover {
        background: var(--primary-dark);
        box-shadow: 0 4px 12px rgba(30, 94, 216, 0.3);
      }

      .modal-confirm-btn.out {
        background: var(--danger);
      }

      .modal-confirm-btn.out:hover {
        background: #dc2626;
      }

      .modal-cancel {
        width: 100%;
        padding: 12px;
        background: transparent;
        color: var(--text-secondary);
        border: none;
        font-weight: 600;
        cursor: pointer;
        font-size: 13px;
      }

      /* ── TOAST ── */
      .toast {
        position: fixed;
        bottom: 20px;
        left: 16px;
        right: 16px;
        background: var(--surface);
        padding: 14px 16px;
        border-radius: 10px;
        border-left: 4px solid var(--primary);
        box-shadow: var(--shadow-lg);
        transform: translateY(120px);
        opacity: 0;
        transition: all 0.3s;
        z-index: 1000;
        font-size: 13px;
        font-weight: 500;
      }

      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      .toast.success {
        border-color: var(--success);
      }

      .toast.error {
        border-color: var(--danger);
      }

      /* ── UTILITY ── */
      .hidden {
        display: none !important;
      }

      @media (max-width: 480px) {
        .container {
          padding: 12px;
        }

        .card {
          border-radius: 10px;
          padding: 14px;
          margin-bottom: 12px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <div class="header">
      <div class="header-left">
        <div class="header-icon">C</div>
        <div>
          <div class="header-title">SDPL</div>
          <div class="header-subtitle">EMPLOYEE PORTAL</div>
        </div>
      </div>
      <div class="header-right">
        <button class="header-btn" title="Notifications">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
        </button>
        <button class="header-btn" title="Menu" onclick="logout()">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="1" />
            <circle cx="12" cy="5" r="1" />
            <circle cx="12" cy="19" r="1" />
          </svg>
        </button>
      </div>
    </div>

    <!-- CONTAINER -->
    <div class="container">
      <!-- INFO CARDS -->
      <div class="info-grid">
        <div class="info-card">
          <div class="info-card-icon"></div>
          <div class="info-card-label">Shift</div>
          <div class="info-card-value" id="shiftInfo">Regular</div>
        </div>
        <div class="info-card">
          <div class="info-card-icon"></div>
          <div class="info-card-label">Branch</div>
          <div class="info-card-value" id="branchInfo">—</div>
        </div>
        <div class="info-card">
          <div class="info-card-icon"></div>
          <div class="info-card-label">Date</div>
          <div class="info-card-value" id="dateInfo">—</div>
        </div>
      </div>

      <!-- CLOCK CARD -->
      <div class="clock-card">
        <div class="clock-label">LIVE ATTENDANCE TRACKING</div>
        <div class="clock-display">
          <span class="clock-time" id="currentTime">00:00:00</span>
          <span class="clock-period" id="timePeriod">AM</span>
        </div>
        <div class="status-badge" id="statusBadge">
          <span class="status-dot"></span>
          <span id="statusText">Acquiring GPS…</span>
        </div>
      </div>

      <!-- ACTION BUTTONS -->
      <div class="action-grid">
        <button
          class="action-btn punch-in"
          id="punchInBtn"
          onclick="openConfirm('in')"
          disabled
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5m0 0l-5-5"
            />
          </svg>
          Punch In
        </button>
        <button
          class="action-btn punch-out"
          id="punchOutBtn"
          onclick="openConfirm('out')"
          disabled
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4m0 18l5-5m0 0l-5-5"
            />
          </svg>
          Punch Out
        </button>
      </div>

      <!-- RECENT ACTIVITY -->
      <!-- <div class="activity-section card">
        <div class="activity-header">
          <span class="activity-title">Recent Activity</span>
          <a class="activity-link" href="#">View All</a>
        </div>
        <div id="activityList">
          <div class="activity-item">
            <div class="activity-icon">✓</div>
            <div class="activity-content">
              <div class="activity-name">Loading activity…</div>
              <div class="activity-time">—</div>
            </div>
          </div>
        </div>
      </div> -->

      <!-- LIVE LOCATION -->
      <div class="card map-card">
        <div class="card-label">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
            <circle cx="12" cy="10" r="3" />
          </svg>
          LIVE LOCATION
        </div>
        <div class="map-container">
          <div class="map-placeholder" id="mapPlaceholder">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
              <circle cx="12" cy="10" r="3" />
            </svg>
            <span>Acquiring GPS…</span>
          </div>
          <div id="leafletMap"></div>
        </div>
        <div class="map-footer">
          <span id="locationInfo">—</span>
          <span id="radiusInfo">OFFICE RADIUS: —</span>
        </div>
      </div>

      <!-- LOCATION DETAILS -->
      <div class="location-details" id="locationDetails" style="display: none">
        <strong>ID:</strong> <span id="locationId">—</span><br />
        <strong>Coordinates:</strong> <span id="locationCoords">—</span><br />
        <strong>Accuracy:</strong> <span id="locationAccuracy">—</span>
      </div>
    </div>

    <!-- CONFIRM MODAL -->
    <div
      class="modal-overlay"
      id="confirmModal"
      onclick="closeConfirmOnBg(event)"
    >
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <div class="modal-title" id="modalTitle">Confirm Punch Location</div>
        </div>
        <div class="modal-map" id="confirmMapContainer">
          <div id="confirmMap"></div>
        </div>
        <div class="modal-body">
          <div class="modal-info">
            <div class="modal-label">Location</div>
            <div class="modal-address" id="modalAddress">Fetching address…</div>
          </div>
          <div class="modal-time-row">
            <div>
              <div class="modal-time" id="modalTime">00:00 AM</div>
              <div class="modal-date" id="modalDate">—</div>
            </div>
            <div class="modal-meta">
              <div id="modalDist">—</div>
              <div
                id="modalLate"
                style="color: var(--warning); font-weight: 700; margin-top: 3px"
              ></div>
            </div>
          </div>
          <button
            class="modal-confirm-btn"
            id="modalConfirmBtn"
            onclick="confirmPunch()"
          >
            Punch In
          </button>
          <button class="modal-cancel" onclick="closeConfirm()">Cancel</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const API = "/api";
      let token = localStorage.getItem("token");
      let user = null;

      // Maps
      let leafMap = null;
      let confirmMap = null;
      let userMarker = null;
      let officeCir = null;

      // Location
      let locationWatcher = null;
      let userLat = null,
        userLng = null;
      let isInsideRange = null;
      let hasOfficeLocation = false;

      // Attendance
      let isPunchedIn = false;
      let isCompleted = false;
      let pendingType = null;
      let modalTimer = null;

      /* ── Utilities ── */
      function toast(msg, type = "success") {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = `toast ${type} show`;
        setTimeout(() => el.classList.remove("show"), 4000);
      }

      function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371000,
          dLat = ((lat2 - lat1) * Math.PI) / 180,
          dLon = ((lon2 - lon1) * Math.PI) / 180;
        const a =
          Math.sin(dLat / 2) ** 2 +
          Math.cos((lat1 * Math.PI) / 180) *
            Math.cos((lat2 * Math.PI) / 180) *
            Math.sin(dLon / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      async function apiFetch(url, method = "GET", body = null) {
        const opts = {
          method,
          headers: { "Content-Type": "application/json" },
        };
        if (token) opts.headers["Authorization"] = `Bearer ${token}`;
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(API + url, opts);
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Request failed");
        return data;
      }

      /* ── Auth ── */
      async function checkAuth() {
        if (!token) {
          window.location.href = "/login";
          return false;
        }
        try {
          user = await apiFetch("/auth/me");
          return true;
        } catch (e) {
          localStorage.removeItem("token");
          window.location.href = "/login";
          return false;
        }
      }

      function logout() {
        localStorage.removeItem("token");
        if (locationWatcher) navigator.geolocation.clearWatch(locationWatcher);
        window.location.href = "/login";
      }

      /* ── Clock ── */
      function updateClock() {
        const now = new Date(),
          h = now.getHours(),
          m = now.getMinutes().toString().padStart(2, "0"),
          s = now.getSeconds().toString().padStart(2, "0"),
          ap = h >= 12 ? "PM" : "AM";
        document.getElementById("currentTime").textContent =
          `${(h % 12 || 12).toString().padStart(2, "0")}:${m}:${s}`;
        document.getElementById("timePeriod").textContent = ap;
      }

      /* ── Init ── */
      async function initDashboard() {
        try {
          const ok = await checkAuth();
          if (!ok) return;

          document.querySelector(".header-title").textContent =
            user.company_name || "SDPL";

          const fmt = (t) => {
            const [h, m] = t.split(":");
            const hN = parseInt(h, 10);
            const ap = hN >= 12 ? "PM" : "AM";
            return `${hN % 12 || 12}:${m} ${ap}`;
          };

          if (user.shift_start && user.shift_end) {
            document.getElementById("shiftInfo").textContent =
              `${fmt(user.shift_start).split(" ")[0].substring(0, 5)}-${fmt(user.shift_end)}`;
          }

          document.getElementById("branchInfo").textContent = (
            user.branch_name || "N/A"
          ).substring(0, 12);

          document.getElementById("dateInfo").textContent =
            new Date().toLocaleDateString("en-IN", {
              day: "2-digit",
              month: "short",
              year: "2-digit",
            });

          hasOfficeLocation = user.branch_lat && user.branch_lng;

          if (user.radius_meters) {
            document.getElementById("radiusInfo").textContent =
              `OFFICE RADIUS: ${user.radius_meters}M`;
          }

          setInterval(updateClock, 1000);
          updateClock();
          await loadStatus();
          detectLocation();
        } catch (e) {
          console.error("Init error:", e);
          toast("Error loading dashboard", "error");
        }
      }

      async function loadStatus() {
        try {
          const data = await apiFetch("/attendance/status");
          isPunchedIn = data.is_punched_in;
          isCompleted = data.state === "completed";
          updatePunchButtons();
        } catch (e) {
          console.error("Status error:", e);
        }
      }

      function updatePunchButtons() {
        const inBtn = document.getElementById("punchInBtn");
        const outBtn = document.getElementById("punchOutBtn");

        if (isCompleted) {
          inBtn.disabled = true;
          outBtn.disabled = true;
          inBtn.textContent = "Done ✓";
          outBtn.textContent = "Done ✓";
          return;
        }

        const locationOk = !hasOfficeLocation || isInsideRange === true;

        if (isPunchedIn) {
          inBtn.disabled = true;
          outBtn.disabled = false;
        } else {
          inBtn.disabled = hasOfficeLocation ? !locationOk : false;
          outBtn.disabled = true;
        }
      }

      /* ── Maps ── */
      function initMainMap(lat, lng) {
        try {
          const placeholder = document.getElementById("mapPlaceholder");
          placeholder.classList.add("hidden");

          if (!leafMap) {
            leafMap = L.map("leafletMap", {
              zoomControl: false,
              attributionControl: false,
            });
            L.tileLayer(
              "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
            ).addTo(leafMap);
            L.control.zoom({ position: "bottomright" }).addTo(leafMap);
          }

          const userIcon = L.divIcon({
            html: `<div style="width:12px;height:12px;background:#1e5ed8;border:3px solid white;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>`,
            iconSize: [12, 12],
            iconAnchor: [6, 6],
          });

          if (!userMarker) {
            userMarker = L.marker([lat, lng], { icon: userIcon }).addTo(
              leafMap,
            );
          } else {
            userMarker.setLatLng([lat, lng]);
          }

          if (hasOfficeLocation) {
            const offIcon = L.divIcon({
              html: `<div style="width:10px;height:10px;background:#ef4444;border:3px solid white;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>`,
              iconSize: [10, 10],
              iconAnchor: [5, 5],
            });

            let hasOffMarker = false;
            leafMap.eachLayer((layer) => {
              if (
                layer._latlng &&
                layer._latlng.lat === user.branch_lat &&
                layer._latlng.lng === user.branch_lng
              ) {
                hasOffMarker = true;
              }
            });

            if (!hasOffMarker) {
              L.marker([user.branch_lat, user.branch_lng], {
                icon: offIcon,
              }).addTo(leafMap);
            }

            if (!officeCir) {
              officeCir = L.circle([user.branch_lat, user.branch_lng], {
                radius: user.radius_meters || 200,
                color: "#10b981",
                fillColor: "#10b981",
                fillOpacity: 0.1,
                weight: 2,
              }).addTo(leafMap);
            }

            leafMap.fitBounds(
              L.latLngBounds([
                [lat, lng],
                [user.branch_lat, user.branch_lng],
              ]),
              { padding: [50, 50] },
            );
          } else {
            leafMap.setView([lat, lng], 16);
          }

          setTimeout(() => {
            if (leafMap) leafMap.invalidateSize();
          }, 100);
        } catch (e) {
          console.error("Map error:", e);
        }
      }

      function initConfirmMap(lat, lng) {
        try {
          if (!confirmMap) {
            confirmMap = L.map("confirmMap", {
              zoomControl: false,
              attributionControl: false,
            });
            L.tileLayer(
              "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
            ).addTo(confirmMap);
          }

          confirmMap.setView([lat, lng], 16);
          confirmMap.eachLayer((layer) => {
            if (layer instanceof L.Marker || layer instanceof L.Circle) {
              confirmMap.removeLayer(layer);
            }
          });

          const icon = L.divIcon({
            html: `<div style="width:14px;height:14px;background:#1e5ed8;border:3px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.35)"></div>`,
            iconSize: [14, 14],
            iconAnchor: [7, 7],
          });
          L.marker([lat, lng], { icon }).addTo(confirmMap);

          if (hasOfficeLocation) {
            L.circle([user.branch_lat, user.branch_lng], {
              radius: user.radius_meters || 200,
              color: "#10b981",
              fillColor: "#10b981",
              fillOpacity: 0.1,
              weight: 2,
            }).addTo(confirmMap);
          }

          setTimeout(() => {
            if (confirmMap) confirmMap.invalidateSize();
          }, 100);
        } catch (e) {
          console.error("Confirm map error:", e);
        }
      }

      async function getAddress(lat, lng) {
        try {
          const r = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,
            { headers: { "Accept-Language": "en" } },
          );
          const d = await r.json();
          return d.display_name || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        } catch {
          return `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        }
      }

      /* ── GPS ── */
      function updateLocationUI(lat, lng, accuracy) {
        userLat = lat;
        userLng = lng;

        document.getElementById("locationCoords").textContent =
          `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        document.getElementById("locationAccuracy").textContent =
          `${Math.round(accuracy)}m`;

        initMainMap(lat, lng);

        if (hasOfficeLocation) {
          checkDistance();
        } else {
          isInsideRange = true;
          setBadge(true, "Inside Geofence Range");
          document.getElementById("locationInfo").textContent = `✓ In Range`;
          updatePunchButtons();
        }
      }

      function detectLocation() {
        if (!navigator.geolocation) {
          setBadge(false, "Location Unavailable");
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            updateLocationUI(
              pos.coords.latitude,
              pos.coords.longitude,
              pos.coords.accuracy,
            );

            if (locationWatcher)
              navigator.geolocation.clearWatch(locationWatcher);

            locationWatcher = navigator.geolocation.watchPosition(
              (p) => {
                updateLocationUI(
                  p.coords.latitude,
                  p.coords.longitude,
                  p.coords.accuracy,
                );
              },
              () => {},
              { enableHighAccuracy: true, maximumAge: 10000, timeout: 20000 },
            );
          },
          (err) => {
            const msgs = {
              1: "Location permission denied",
              2: "GPS unavailable",
              3: "GPS timed out",
            };
            setBadge(false, msgs[err.code] || "Location error");
            if (!hasOfficeLocation) {
              isInsideRange = true;
              updatePunchButtons();
            }
          },
          { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 },
        );
      }

      function checkDistance() {
        if (!userLat || !hasOfficeLocation) return;

        const dist = Math.round(
          haversine(userLat, userLng, user.branch_lat, user.branch_lng),
        );
        isInsideRange = dist <= (user.radius_meters || 200);

        setBadge(
          isInsideRange,
          isInsideRange
            ? "Inside Geofence Range"
            : `Outside Range (${dist}m away)`,
        );
        document.getElementById("locationInfo").textContent = isInsideRange
          ? `✓ In Range (${dist}m)`
          : `${dist}m away`;
        updatePunchButtons();
      }

      function setBadge(inside, text) {
        const b = document.getElementById("statusBadge");
        if (inside === true) {
          b.className = "status-badge";
        } else if (inside === false) {
          b.className = "status-badge outside";
        } else {
          b.className = "status-badge pending";
        }
        document.getElementById("statusText").textContent = text;
      }

      /* ── Modal ── */
      async function openConfirm(type) {
        if (!userLat || !userLng) {
          toast("GPS not available yet", "error");
          return;
        }

        if (type === "in" && hasOfficeLocation && !isInsideRange) {
          toast("You must be inside office radius", "error");
          return;
        }

        pendingType = type;
        document.getElementById("modalTitle").textContent =
          type === "in" ? "Confirm Punch In" : "Confirm Punch Out";
        document.getElementById("modalConfirmBtn").textContent =
          type === "in" ? "Punch In" : "Punch Out";
        document.getElementById("modalConfirmBtn").className =
          type === "out" ? "modal-confirm-btn out" : "modal-confirm-btn";

        if (hasOfficeLocation) {
          const dist = Math.round(
            haversine(userLat, userLng, user.branch_lat, user.branch_lng),
          );
          document.getElementById("modalDist").textContent =
            `${dist}m from office`;
        }

        if (modalTimer) clearInterval(modalTimer);
        const tick = () => {
          const now = new Date();
          const h = now.getHours(),
            m = now.getMinutes().toString().padStart(2, "0"),
            ap = h >= 12 ? "PM" : "AM";
          document.getElementById("modalTime").textContent =
            `${(h % 12 || 12).toString().padStart(2, "0")}:${m} ${ap}`;
          document.getElementById("modalDate").textContent =
            now.toLocaleDateString("en-IN");
        };
        tick();
        modalTimer = setInterval(tick, 1000);

        document.getElementById("modalAddress").textContent =
          "Fetching address…";
        getAddress(userLat, userLng).then(
          (a) => (document.getElementById("modalAddress").textContent = a),
        );

        document.getElementById("confirmModal").classList.add("open");
        setTimeout(() => {
          initConfirmMap(userLat, userLng);
          if (confirmMap) confirmMap.invalidateSize();
        }, 150);
      }

      function closeConfirm() {
        document.getElementById("confirmModal").classList.remove("open");
        if (modalTimer) clearInterval(modalTimer);
        pendingType = null;
      }

      function closeConfirmOnBg(e) {
        if (e.target === document.getElementById("confirmModal"))
          closeConfirm();
      }

      async function confirmPunch() {
        const type = pendingType;
        if (!type) return;

        const btn = document.getElementById("modalConfirmBtn");
        btn.disabled = true;
        btn.textContent = "Processing…";

        try {
          const ep =
            type === "in" ? "/attendance/punch-in" : "/attendance/punch-out";
          const data = await apiFetch(ep, "POST", {
            latitude: userLat,
            longitude: userLng,
          });

          toast(data.message || "Success", "success");
          closeConfirm();

          if (type === "in") {
            isPunchedIn = true;
          } else {
            isCompleted = true;
          }

          updatePunchButtons();
        } catch (e) {
          toast(e.message, "error");
          btn.disabled = false;
          btn.textContent = type === "in" ? "Punch In" : "Punch Out";
        }
      }

      // Init
      document.addEventListener("DOMContentLoaded", initDashboard);

      window.addEventListener("beforeunload", () => {
        if (locationWatcher) navigator.geolocation.clearWatch(locationWatcher);
      });

      window.addEventListener("resize", () => {
        if (leafMap) leafMap.invalidateSize();
        if (
          confirmMap &&
          document.getElementById("confirmModal").classList.contains("open")
        ) {
          confirmMap.invalidateSize();
        }
      });
    </script>
  </body>
</html>
